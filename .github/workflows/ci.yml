name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff
        run: ruff check .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build the compiled wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build pytest
          python -m build --wheel

      - name: Install the built wheel
        shell: bash
        run: python -m pip install dist/*.whl

      # Run from tests/ so the source tree does not shadow the installed
      # compiled package (import number_theory must resolve to the .pyd).
      - name: Run tests against the installed (compiled) module
        shell: bash
        run: cd tests && python -m pytest -q

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  # Prove the single stable-ABI (abi3) wheel works across Python versions (#23):
  # build it once, then install that exact wheel on 3.11-3.14 and run the tests.
  abi3-build:
    name: abi3 · build one wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build the abi3 wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: abi3-wheel
          path: dist/*.whl

  abi3-compat:
    name: abi3 · runs on py${{ matrix.python-version }}
    needs: abi3-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: abi3-wheel
          path: dist
      - name: Install the ONE abi3 wheel and run the tests
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install dist/*.whl
          cd tests && python -m pytest -q
