name: Release wheels

# When a GitHub Release is published, build the stable-ABI (abi3) wheel for
# each OS and attach it. One wheel per OS now covers CPython 3.11+, so users
# on any of those versions can `pip install` — no per-version wheels needed.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheels:
    name: abi3 wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the abi3 wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Attach wheel to the release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl --clobber
