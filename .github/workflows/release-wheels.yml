name: Release wheels

# When a GitHub Release is published, build wheels across platforms/Python
# versions and attach them to that release, so users who aren't on the same
# OS + Python as the maintainer can still `pip install`.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheels:
    name: wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build the compiled wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Attach wheel to the release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl --clobber
